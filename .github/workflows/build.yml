name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build-sdist:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - uses: astral-sh/setup-uv@v8.2.0

    - name: Build
      run: |
        uv build --sdist

    - uses: actions/upload-artifact@v7
      with:
        name: vapoursynth-sdist
        path: dist

  build-wheel:
    strategy:
      matrix:
        include:
        - arch: win_amd64
          runs-on: windows-2025-vs2026
        - arch: linux_x86_64
          runs-on: ubuntu-latest
        - arch: linux_aarch64
          runs-on: ubuntu-24.04-arm
        - arch: macosx_x86_64
          runs-on: macos-26-intel
        - arch: macosx_arm64
          runs-on: macos-26
      fail-fast: false

    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v7

    - uses: astral-sh/setup-uv@v8.2.0

    - uses: pypa/cibuildwheel@v4.1.0
      env:
        CIBW_BUILD: cp314-win_amd64 cp312-*
        CIBW_SKIP: cp312-win*
        CIBW_BUILD_FRONTEND: uv
        CIBW_CONFIG_SETTINGS_WINDOWS: setup-args=--debug setup-args=--vsenv
        CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=13.3
        CIBW_ENVIRONMENT_WINDOWS: CC=clang-cl CXX=clang-cl AR=llvm-lib
        CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ""
      with:
        output-dir: dist

    - name: Fix tag
      if: ${{ runner.os == 'Windows' }}
      run: |
        cd dist
        Get-ChildItem *.whl | ForEach-Object { uvx wheel tags --remove --python-tag cp312 $_.Name }

    - uses: actions/upload-artifact@v7
      with:
        name: vapoursynth-${{ matrix.arch }}
        path: dist

    - name: Install and run tests
      run: |
        pip install vapoursynth --no-index --find-links dist
        vapoursynth config
        vapoursynth register-install
        vspipe --version
        python -m unittest discover -s test -p "*test.py"

    # The Windows wheel just built is the same one the installer and portable
    # packages ship, so package them here instead of recompiling the wheel in a
    # separate job. Everything below only runs on the Windows leg.
    - name: Install documentation tools
      if: ${{ runner.os == 'Windows' }}
      run: |
        py -3.14 -m ensurepip
        py -3.14 -m pip install --upgrade -r python-requirements.txt

    - name: Build docs and package installer and portable
      if: ${{ runner.os == 'Windows' }}
      shell: cmd
      env:
        SKIP_WAIT: '1'
      run: |
        call docs_build.bat
        cd installer
        call make_portable.bat
        call make_installers.bat

    - name: Check installer artifacts
      if: ${{ runner.os == 'Windows' }}
      run: |
        $dir = 'installer/Compiled'
        $exe = @(Get-ChildItem $dir -Filter *.exe -ErrorAction SilentlyContinue)
        $zip = @(Get-ChildItem $dir -Filter *.zip -ErrorAction SilentlyContinue)
        if ($exe.Count -lt 1) { throw 'installer .exe was not produced' }
        if ($zip.Count -lt 2) { throw "expected the two portable zips, found $($zip.Count)" }
        Get-ChildItem $dir | Select-Object Name, Length

    - name: Upload installer and portable
      if: ${{ runner.os == 'Windows' }}
      uses: actions/upload-artifact@v7
      with:
        name: windows-installer
        path: installer/Compiled/*

    - name: Publish installer to release
      if: ${{ runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/R') }}
      uses: softprops/action-gh-release@v2
      with:
        files: installer/Compiled/*

  publish:
    permissions:
      id-token: write
    needs: [build-sdist, build-wheel]
    if: ${{ startsWith(github.ref, 'refs/tags/R') }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v8
      with:
        path: dist
        pattern: vapoursynth-*
        merge-multiple: true

    - uses: pypa/gh-action-pypi-publish@release/v1
