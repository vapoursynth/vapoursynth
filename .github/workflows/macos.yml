name: macOS

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    strategy:
      matrix:
        include:
        - arch: arm64
          runs-on: macos-26
        - arch: x86_64
          runs-on: macos-26-intel
      fail-fast: false

    runs-on: ${{ matrix.runs-on }}

    env:
      MACOSX_DEPLOYMENT_TARGET: 13.3

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Homebrew packages
      run: |
        brew update
        brew install automake libtool

    - name: Install Python packages
      run: |
        python -m pip install -U pip
        pip install -U abi3audit build

    - name: Set environment variables
      run: |
        echo "nproc=$(sysctl -n hw.logicalcpu)" >> $GITHUB_ENV

    - name: Install zimg
      run: |
        git clone https://github.com/sekrit-twc/zimg.git --depth 1 --recurse-submodules --shallow-submodules
        pushd zimg
        ./autogen.sh
        ./configure
        make -j${{ env.nproc }}
        sudo make install -j${{ env.nproc }}
        popd
        rm -rf zimg

    - name: Build
      run: |
        python -m build

    - name: Check for abi3 violations or inconsistencies
      run: |
        abi3audit --verbose dist/*.whl

    - uses: actions/upload-artifact@v7
      with:
        name: vapoursynth-sdist
        path: dist/*.tar.gz
        overwrite: true

    - uses: actions/upload-artifact@v7
      with:
        name: vapoursynth-macosx_${{ matrix.arch }}
        path: dist/*.whl

    - name: Install
      run: |
        pip install vapoursynth --no-index --find-links dist

    - name: Run test
      run: |
        vsscript-config
        vspipe --version
        python -m unittest discover -s test -p "*test.py"
